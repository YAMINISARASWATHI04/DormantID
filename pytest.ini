[pytest]
testpaths = backend/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
markers =
    unit: Unit tests
    integration: Integration tests
    e2e: End-to-end integration tests
    slow: Slow running tests
    api: API endpoint tests
    validators: Validator module tests
    pipeline: Pipeline orchestration tests
    decision_engine: Decision engine tests
    user_filters: User filtering tests
    filters: Filter manager tests
    extractor: Extractor wrapper tests
    edge_cases: Edge cases and security tests
asyncio_mode = auto

